services:
  # Backend
  - type: web
    name: template-profiler-backend
    env: python
    region: frankfurt
    plan: free
    rootDir: backend

    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT

    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0

  # Frontend
  - type: web
    name: template-profiler-frontend
    env: static
    plan: free

    rootDir: frontend

    buildCommand: npm install && npm run build

    staticPublishPath: dist

    envVars:
      - key: VITE_API_URL
        value: https://template-profiler-backend.onrender.com